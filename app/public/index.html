<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureNotes - 나만의 비공개 메모</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      padding: 60px 40px;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 16px;
      letter-spacing: -1px;
    }
    .tagline {
      font-size: 18px;
      color: #64748b;
      margin-bottom: 48px;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
      text-align: left;
    }
    .feature {
      padding: 20px;
      background: #f8fafc;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    .feature-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .feature-title {
      font-size: 16px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 4px;
    }
    .feature-desc {
      font-size: 14px;
      color: #64748b;
    }
    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .btn {
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }
    .btn-secondary:hover {
      background: #f8fafc;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">SecureNotes</h1>
    <p class="tagline">소중한 메모를 안전하게 보관하세요</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-title">암호화</div>
        <div class="feature-desc">안전한 비공개 저장</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-title">빠른 접근</div>
        <div class="feature-desc">언제든지 즉시 확인</div>
      </div>
      <div class="feature">
        <div class="feature-icon">☁️</div>
        <div class="feature-title">동기화</div>
        <div class="feature-desc">어디서든 접근 가능</div>
      </div>
    </div>

    <div class="actions">
      <a href="/login.html" class="btn btn-primary">로그인</a>
      <a href="/register.html" class="btn btn-secondary">회원가입</a>
    </div>
  </div>

  <script>
    // 이미 로그인되어 있으면 notes 페이지로 리다이렉트
    fetch('/api/me', { credentials: 'include' })
      .then(res => res.ok ? res.json() : null)
      .then(user => {
        if (user && user.id) {
          window.location.href = '/notes.html';
        }
      })
      .catch(() => {});
  </script>
</body>
</html>
